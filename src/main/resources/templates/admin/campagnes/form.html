<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Formulaire Campagne</title>
</head>
<body>
<section>
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/campagnes}" class="btn btn-light border me-3"><i class="fa-solid fa-arrow-left"></i> Retour</a>
        <h4 class="fw-bold m-0" th:text="${campagne.id != null ? 'Modifier la campagne' : 'Nouvelle campagne'}"></h4>
    </div>

    <div class="card-modern p-4 max-w-lg mx-auto">
        <form th:action="${campagne.id != null ? '/admin/campagnes/' + campagne.id + '/edit' : '/admin/campagnes/nouvelle'}" 
              th:object="${campagne}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div th:if="${#fields.hasErrors('active')}" class="alert alert-danger" th:errors="*{active}"></div>

            <div class="mb-3">
                <label for="anneeUniv" class="form-label text-muted fw-semibold">Année Universitaire (ex: 2026-2027)</label>
                <input type="text" id="anneeUniv" class="form-control" th:field="*{anneeUniv}" placeholder="YYYY-YYYY" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('anneeUniv')}" th:errors="*{anneeUniv}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="dateOuverture" class="form-label text-muted fw-semibold">Date d'ouverture</label>
                    <input type="date" id="dateOuverture" class="form-control" th:field="*{dateOuverture}" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dateOuverture')}" th:errors="*{dateOuverture}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="dateFermeture" class="form-label text-muted fw-semibold">Date de fermeture</label>
                    <input type="date" id="dateFermeture" class="form-control" th:field="*{dateFermeture}" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dateFermeture')}" th:errors="*{dateFermeture}"></div>
                </div>
            </div>

            <div class="mb-4 form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="active" th:field="*{active}">
                <label class="form-check-label ms-2" for="active">Activer immédiatement (désactivera les autres)</label>
            </div>

            <div class="d-flex justify-content-end gap-2 border-top pt-3">
                <button type="submit" class="btn btn-primary" th:text="${campagne.id != null ? 'Enregistrer les modifications' : 'Créer la campagne'}"></button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
