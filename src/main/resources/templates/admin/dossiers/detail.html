<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Détails du Dossier</title>
</head>
<body>
<section>
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/dossiers}" class="btn btn-light border me-3"><i class="fa-solid fa-arrow-left"></i> Retour</a>
        <h4 class="fw-bold m-0" th:text="'Dossier de ' + ${dossier.doctorant.user.nom} + ' ' + ${dossier.doctorant.user.prenom}"></h4>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card-modern p-4 mb-4">
                <h5 class="fw-bold mb-3 border-bottom pb-2">Informations Générales</h5>
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Campagne :</div>
                    <div class="col-sm-8" th:text="${dossier.campagne.anneeUniv}"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Directeur :</div>
                    <div class="col-sm-8" th:text="${dossier.directeur.user.nom + ' ' + dossier.directeur.user.prenom}"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Statut actuel :</div>
                    <div class="col-sm-8"><span class="badge bg-primary" th:text="${dossier.statut.name()}"></span></div>
                </div>
                <p><strong>Sujet :</strong></p>
                <p class="text-muted border rounded p-3 bg-light" th:text="${dossier.sujetThese}"></p>
            </div>

            <div class="card-modern p-4">
                <h5 class="fw-bold mb-3 border-bottom pb-2">Documents attachés</h5>
                <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(documents)}">
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0" th:each="doc : ${documents}">
                        <div>
                            <span class="fw-semibold" th:text="${doc.typeDocument}"></span>
                            <br><small class="text-muted" th:text="${doc.nomFichier}"></small>
                        </div>
                        <a th:href="@{'/fichiers/' + ${doc.cheminFichier}}" target="_blank" class="btn btn-sm btn-outline-primary">Télécharger</a>
                    </li>
                </ul>
                <p class="text-muted mt-2" th:if="${#lists.isEmpty(documents)}">Aucun document joint.</p>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card-modern p-4" th:if="${dossier.statut.name() == 'VALIDE_DIRECTEUR'}">
                <h5 class="fw-bold mb-3">Action Admin Requise</h5>
                
                <form th:action="@{'/admin/dossiers/' + ${dossier.oid} + '/valider'}" method="post" class="mb-4">
                    <button type="submit" class="btn btn-success w-100">Valider Définitivement (Admin)</button>
                </form>

                <hr class="text-muted">

                <form th:action="@{'/admin/dossiers/' + ${dossier.oid} + '/rejeter'}" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Motif du rejet (Obligatoire)</label>
                        <textarea name="motif" class="form-control" rows="3" required placeholder="Expliquez pourquoi le dossier est rejeté..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-outline-danger w-100">Rejeter le dossier</button>
                </form>
            </div>

            <div class="card-modern p-4 bg-light" th:unless="${dossier.statut.name() == 'VALIDE_DIRECTEUR'}">
                <h5 class="fw-bold mb-0 text-center text-muted">
                    <span th:if="${dossier.statut.name() == 'VALIDE_ADMIN'}">Dossier définitivement validé.</span>
                    <span th:if="${dossier.statut.name() == 'REJETE'}">Dossier rejeté.</span>
                    <span th:if="${dossier.statut.name() == 'SOUMIS' || dossier.statut.name() == 'BROUILLON'}">En attente du traitement par le directeur.</span>
                </h5>
            </div>
        </div>
    </div>
</section>
</body>
</html>
