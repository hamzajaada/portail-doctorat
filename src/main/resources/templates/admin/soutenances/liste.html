<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Soutenances - Portail Doctorat</title>
</head>
<body>
<section class="container py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold text-primary">
                <i class="fa-solid fa-graduation-cap me-2"></i>Soutenances
            </h2>
            <p class="text-muted">Gérez toutes les demandes de soutenance.</p>
        </div>
    </div>

    <!-- Filtres -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form th:action="@{/admin/soutenances}" method="get" class="d-flex align-items-center">
                        <label class="me-3 fw-medium">Filtrer par statut :</label>
                        <select name="statut" class="form-select w-auto me-3" onchange="this.form.submit()">
                            <option value="">Tous les statuts</option>
                            <option th:each="s : ${T(ma.emsi.doctorat.portaildoctorat1.entities.StatutSoutenance).values()}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${param.statut != null and param.statut[0] == s.name()}">
                            </option>
                        </select>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Doctorant</th>
                            <th>Date Dépôt</th>
                            <th>Publications</th>
                            <th>Statut</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${demandes.empty}">
                            <td colspan="5" class="text-center py-4 text-muted">
                                Aucune demande trouvée.
                            </td>
                        </tr>
                        <tr th:each="demande : ${demandes}">
                            <td class="ps-4 fw-medium text-dark" th:text="${demande.doctorant.user.nom + ' ' + demande.doctorant.user.prenom}">Nom</td>
                            <td th:text="${#temporals.format(demande.dateDepot, 'dd/MM/yyyy')}">Date</td>
                            <td th:text="${demande.nbPublications}">0</td>
                            <td>
                                <span class="badge bg-secondary" th:if="${demande.statut.name() == 'EN_ATTENTE'}">En attente prérequis</span>
                                <span class="badge bg-warning text-dark" th:if="${demande.statut.name() == 'PREREQUIS_VALIDES'}">Prérequis Validés</span>
                                <span class="badge bg-info text-dark" th:if="${demande.statut.name() == 'JURY_PROPOSE'}">Jury Proposé</span>
                                <span class="badge bg-primary" th:if="${demande.statut.name() == 'AUTORISEE'}">Autorisée</span>
                                <span class="badge bg-success" th:if="${demande.statut.name() == 'PLANIFIEE'}">Planifiée</span>
                                <span class="badge bg-danger" th:if="${demande.statut.name() == 'REJETEE'}">Rejetée</span>
                            </td>
                            <td class="text-end pe-4">
                                <a th:href="@{/admin/soutenances/{id}(id=${demande.oid})}" class="btn btn-sm btn-outline-primary">
                                    Détails
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
