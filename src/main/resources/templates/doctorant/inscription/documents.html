<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Documents Inscription</title>
</head>
<body>
<section>
    <script>document.getElementById('page-title').innerText = 'Mes Documents';</script>

    <div class="row g-4">
        <!-- Liste des documents -->
        <div class="col-md-7">
            <div class="card-modern p-4 h-100">
                <h5 class="fw-bold mb-4">Documents rattachés au dossier</h5>
                
                <div th:if="${#lists.isEmpty(documents)}" class="alert alert-light border text-center p-4">
                    <p class="text-muted mb-0">Aucun document n'a été téléversé pour l'instant.</p>
                </div>
                
                <ul class="list-group list-group-flush mb-4" th:unless="${#lists.isEmpty(documents)}">
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0" th:each="doc : ${documents}">
                        <div>
                            <i class="fa-solid fa-file-pdf text-danger me-2" th:if="${doc.nomFichier.endsWith('.pdf')}"></i>
                            <i class="fa-solid fa-file-image text-primary me-2" th:unless="${doc.nomFichier.endsWith('.pdf')}"></i>
                            <span class="fw-semibold" th:text="${doc.typeDocument}"></span>
                            <br>
                            <small class="text-muted" th:text="${doc.nomFichier}"></small>
                        </div>
                        <a th:href="@{'/fichiers/' + ${doc.cheminFichier}}" target="_blank" class="btn btn-sm btn-outline-primary" title="Télécharger">
                            <i class="fa-solid fa-download"></i>
                        </a>
                    </li>
                </ul>

                <div class="border-top pt-4 text-end">
                    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#soumettreModal">
                        Soumettre définitivement le dossier
                    </button>
                </div>
            </div>
        </div>

        <!-- Formulaire d'upload -->
        <div class="col-md-5">
            <div class="card-modern p-4">
                <h5 class="fw-bold mb-4">Ajouter un document</h5>
                
                <div th:if="${successMessage}" class="alert alert-success py-2 px-3" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger py-2 px-3" role="alert" th:text="${errorMessage}"></div>

                <form th:action="@{'/doctorant/inscription/' + ${dossier.oid} + '/documents'}" th:object="${documentDto}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-muted">Type de document</label>
                        <select class="form-select" th:field="*{typeDocument}">
                            <option value="CIN">Carte d'Identité Nationale</option>
                            <option value="DIPLOME_MASTER">Diplôme Master</option>
                            <option value="RELEVE_NOTES">Relevés de Notes</option>
                            <option value="PROJET_RECHERCHE">Projet de Recherche</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted">Fichier (PDF ou Image, Max 5MB)</label>
                        <input type="file" class="form-control" th:field="*{fichier}" accept=".pdf,.jpg,.jpeg,.png">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-upload me-2"></i> Téléverser
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal de soumission -->
    <div class="modal fade" id="soumettreModal" tabindex="-1" aria-labelledby="soumettreModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h1 class="modal-title fs-5 fw-bold" id="soumettreModalLabel">Confirmer la soumission</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Êtes-vous sûr de vouloir soumettre définitivement ce dossier ? Vous ne pourrez plus modifier ou ajouter de documents.
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
                    <form th:action="@{'/doctorant/inscription/' + ${dossier.oid} + '/soumettre'}" method="post">
                        <button type="submit" class="btn btn-success">Oui, soumettre</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
