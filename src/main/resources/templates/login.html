<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Portail Doctorat</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .logo-circle {
            width: 70px;
            height: 70px;
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px auto;
        }
        .btn-primary-custom {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary-custom:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <div class="logo-circle">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h3 class="fw-bold text-dark">Bon retour !</h3>
        <p class="text-muted small">Connectez-vous à votre espace Portail Doctorat</p>
    </div>

    <!-- Affichage des messages d'erreur ou de déconnexion via Thymeleaf -->
    <div th:if="${param.error}" class="alert alert-danger p-2 small text-center mb-4 border-0 rounded-3">
        Email ou mot de passe incorrect.
    </div>
    <div th:if="${param.logout}" class="alert alert-success p-2 small text-center mb-4 border-0 rounded-3">
        Vous avez été déconnecté avec succès.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Email</label>
            <input type="email" name="username" class="form-control form-control-lg bg-light" placeholder="votre@email.com" required autofocus>
        </div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label text-muted small fw-bold text-uppercase">Mot de passe</label>
            </div>
            <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary-custom mb-3">Se Connecter</button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted small mb-0">Pas encore de compte ? <a href="/register" class="text-decoration-none fw-bold" style="color: #4f46e5;">Créer un compte</a></p>
    </div>
</div>

</body>
</html>
