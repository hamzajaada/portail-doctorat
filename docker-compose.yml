services:
  db:
    image: postgres:15-alpine
    container_name: doctorat_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doctorat_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - doctorat_net

  app:
    build: .
    container_name: doctorat_app
    ports:
      - "8082:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=doctorat_db
      - DB_USER=postgres
      - DB_PASSWORD=password
    depends_on:
      - db
    networks:
      - doctorat_net

volumes:
  pgdata:

networks:
  doctorat_net:
    driver: bridge
